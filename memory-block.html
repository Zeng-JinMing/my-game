<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>记忆方块</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0c1e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    /* ── 背景网格装饰 ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 屏幕容器 ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 20px;
      z-index: 1;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
    }

    /* ══════════════════════════════
       开始屏幕
    ══════════════════════════════ */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* 动态 Logo —— 3×3 小格子 */
    #logo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      width: 78px;
      height: 78px;
      animation: logoFloat 3.5s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .logo-cell {
      border-radius: 5px;
      background: rgba(255,255,255,0.08);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .logo-cell.lit {
      background: linear-gradient(135deg, #22d3ee, #818cf8);
      box-shadow: 0 0 10px rgba(34,211,238,0.7);
    }

    .game-title {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-desc {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      max-width: 270px;
      line-height: 1.7;
    }

    /* 通用按钮 */
    .btn {
      border: none;
      border-radius: 100px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1.5px;
      transition: transform 0.1s, box-shadow 0.2s, opacity 0.1s;
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.18);
      opacity: 0;
      transition: opacity 0.1s;
    }

    .btn:active { transform: scale(0.94); }
    .btn:active::after { opacity: 1; }

    .btn-start {
      font-size: 18px;
      padding: 15px 56px;
      background: linear-gradient(135deg, #22d3ee, #818cf8);
      color: #fff;
      box-shadow: 0 6px 28px rgba(34, 211, 238, 0.4);
    }

    .btn-next {
      font-size: 16px;
      padding: 13px 36px;
      background: linear-gradient(135deg, #34d399, #059669);
      color: #fff;
      box-shadow: 0 4px 20px rgba(52,211,153,0.4);
    }

    .btn-retry {
      font-size: 15px;
      padding: 12px 30px;
      background: rgba(255,255,255,0.07);
      color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* ══════════════════════════════
       游戏屏幕
    ══════════════════════════════ */
    #game-screen { gap: 14px; }

    .game-header {
      width: 100%;
      max-width: 400px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-box {
      min-width: 70px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 7px 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #e5e7eb;
    }

    /* 阶段徽章 */
    .phase-badge {
      padding: 6px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }

    .phase-badge.showing {
      background: rgba(34,211,238,0.14);
      color: #22d3ee;
      border: 1px solid rgba(34,211,238,0.3);
    }

    .phase-badge.clicking {
      background: rgba(167,139,250,0.14);
      color: #a78bfa;
      border: 1px solid rgba(167,139,250,0.3);
    }

    /* 计时条 */
    .timer-row {
      width: 100%;
      max-width: 400px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timer-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #22d3ee, #818cf8);
      transition: width 0.1s linear;
    }

    .timer-fill.danger { background: linear-gradient(90deg, #f97316, #ef4444); }

    .timer-sec {
      font-size: 14px;
      font-weight: 600;
      color: #9ca3af;
      min-width: 28px;
      text-align: right;
    }

    .timer-sec.danger { color: #ef4444; }

    /* 格子容器 */
    #grid-wrap {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 14px;
    }

    #grid {
      display: grid;
    }

    /* 单个格子 */
    .cell {
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.09);
      cursor: default;
      touch-action: manipulation;
      transition:
        background 0.2s,
        box-shadow 0.2s,
        border-color 0.2s,
        transform 0.15s;
    }

    .cell.clickable {
      cursor: pointer;
    }

    .cell.clickable:active {
      transform: scale(0.88);
    }

    /* 展示阶段蓝色 */
    .cell.blue {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      border-color: #38bdf8;
      box-shadow:
        0 0 18px rgba(14,165,233,0.75),
        inset 0 1px 0 rgba(255,255,255,0.3);
      animation: blueAppear 0.25s ease;
    }

    @keyframes blueAppear {
      from { transform: scale(0.75); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    /* 点击正确 */
    .cell.correct {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      border-color: #38bdf8;
      box-shadow: 0 0 18px rgba(14,165,233,0.7);
      animation: popIn 0.28s ease;
    }

    @keyframes popIn {
      0%   { transform: scale(0.8); }
      60%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* 点击错误 */
    .cell.wrong {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      border-color: #f87171;
      box-shadow: 0 0 18px rgba(239,68,68,0.7);
      animation: shake 0.32s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-3px); }
      80%     { transform: translateX(3px); }
    }

    /* 超时未找到（橙色） */
    .cell.missed {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-color: #fbbf24;
      box-shadow: 0 0 14px rgba(245,158,11,0.55);
      animation: popIn 0.25s ease;
    }

    /* 提示文字 */
    .hint-text {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      min-height: 20px;
      transition: color 0.3s;
    }

    .hint-text.urgent { color: #f97316; }

    /* ══════════════════════════════
       GO! 遮罩
    ══════════════════════════════ */
    #go-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    #go-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .go-text {
      font-size: 90px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #34d399, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes goAnim {
      0%   { transform: scale(0.4); opacity: 0; }
      40%  { transform: scale(1.15); opacity: 1; }
      70%  { transform: scale(0.95); opacity: 1; }
      85%  { transform: scale(1.02); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* ══════════════════════════════
       结算屏幕
    ══════════════════════════════ */
    #result-screen { gap: 20px; }

    .result-emoji {
      font-size: 68px;
      animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes bounceIn {
      from { transform: scale(0.2); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
    }

    .result-title.success  { color: #34d399; }
    .result-title.timeout  { color: #f59e0b; }
    .result-title.complete { color: #a78bfa; }

    .result-cards {
      display: flex;
      gap: 12px;
    }

    .result-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 14px 22px;
      text-align: center;
      min-width: 82px;
    }

    .result-card-label {
      font-size: 11px;
      color: #6b7280;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .result-card-value {
      font-size: 26px;
      font-weight: 700;
    }

    .green { color: #34d399; }
    .red   { color: #f87171; }
    .blue  { color: #60a5fa; }

    .btn-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #pauseBtn{position:fixed;bottom:12px;left:12px;z-index:60;display:none;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;}
    #pauseOverlay{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    #pauseOverlay .po-icon{font-size:48px;}
    #pauseOverlay .po-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
    #pauseOverlay .po-btn{width:180px;padding:13px 0;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block;transition:opacity .15s;border:none;}
    #pauseOverlay .po-btn:hover{opacity:.85;}
    #pauseOverlay .po-resume{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.4);}
    #pauseOverlay .po-home{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.25);}
  </style>
</head>
<body>

<div class="bg-grid"></div>

<button id="pauseBtn" onclick="togglePause()">⏸</button>
<div id="pauseOverlay">
  <div class="po-icon">⏸</div>
  <div class="po-title">游戏已暂停</div>
  <button class="po-btn po-resume" onclick="togglePause()">继续游戏</button>
  <button class="po-btn po-home" onclick="goBackCover()">回到主页</button>
</div>

<!-- ══ 开始屏幕 ══ -->
<div id="start-screen" class="screen">
  <div class="logo-wrap">
    <div id="logo-grid"></div>
    <div class="game-title">记忆方块</div>
  </div>
  <div class="game-desc">蓝色方块亮起 2 秒后消失，<br>记住位置，点击找回它们！</div>
  <button class="btn btn-start" onclick="startGame()">开始挑战</button>
</div>

<!-- ══ 游戏屏幕 ══ -->
<div id="game-screen" class="screen hidden">
  <div class="game-header">
    <div class="stat-box">
      <div class="stat-label">关卡</div>
      <div class="stat-value" id="level-val">1</div>
    </div>
    <div class="phase-badge showing" id="phase-badge">记忆中</div>
    <div class="stat-box">
      <div class="stat-label">得分</div>
      <div class="stat-value" id="score-val">0</div>
    </div>
  </div>

  <div class="timer-row">
    <div class="timer-track">
      <div class="timer-fill" id="timer-fill" style="width:100%"></div>
    </div>
    <div class="timer-sec" id="timer-sec">--</div>
  </div>

  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <div class="hint-text" id="hint-text">请观察蓝色方块的位置…</div>
</div>

<!-- ══ 结算屏幕 ══ -->
<div id="result-screen" class="screen hidden">
  <div class="result-emoji" id="res-emoji">🎉</div>
  <div class="result-title" id="res-title">通关成功！</div>
  <div class="result-cards">
    <div class="result-card">
      <div class="result-card-label">正确</div>
      <div class="result-card-value green" id="res-correct">0</div>
    </div>
    <div class="result-card">
      <div class="result-card-label">错误</div>
      <div class="result-card-value red" id="res-wrong">0</div>
    </div>
    <div class="result-card">
      <div class="result-card-label">总分</div>
      <div class="result-card-value blue" id="res-score">0</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-retry" onclick="restartGame()">重新开始</button>
    <button class="btn btn-next" id="btn-next" onclick="nextLevel()">下一关 →</button>
  </div>
</div>

<!-- ══ GO! 遮罩 ══ -->
<div id="go-overlay">
  <div class="go-text" id="go-text">GO!</div>
</div>

<script>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
     关卡配置表
     N: 矩阵边长  X: 蓝色方块数量  time: 作答秒数
  ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  const LEVELS = [
    { N: 3, X: 3,  time: 15 },  // 1
    { N: 3, X: 4,  time: 14 },  // 2
    { N: 4, X: 4,  time: 13 },  // 3
    { N: 4, X: 5,  time: 12 },  // 4
    { N: 4, X: 6,  time: 11 },  // 5
    { N: 5, X: 6,  time: 10 },  // 6
    { N: 5, X: 7,  time: 10 },  // 7
    { N: 5, X: 9,  time: 9  },  // 8
    { N: 5, X: 11, time: 8  },  // 9
    { N: 6, X: 12, time: 8  },  // 10
    { N: 6, X: 14, time: 7  },  // 11
    { N: 6, X: 16, time: 7  },  // 12
  ];

  const SHOW_MS = 2000; // 蓝色方块展示时长

  /* ── 游戏状态 ── */
  const gs = {
    level: 1,
    score: 0,
    N: 3, X: 3, maxTime: 15,
    blues: [],     // 蓝色格子下标
    correct: [],   // 答对的下标
    wrong: [],     // 答错的下标
    phase: 'idle', // idle | showing | clicking | done
    timer: null,
    timeLeft: 0,
  };

  /* ── 获取关卡配置（超出表格则外推） ── */
  function levelCfg(lv) {
    if (lv <= LEVELS.length) return LEVELS[lv - 1];
    const last  = LEVELS[LEVELS.length - 1];
    const extra = lv - LEVELS.length;
    return {
      N:    Math.min(8, last.N + Math.floor(extra / 4)),
      X:    Math.min(last.N * last.N - 2, last.X + Math.ceil(extra / 2)),
      time: Math.max(5, last.time - Math.floor(extra / 3)),
    };
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
     Logo 动画初始化
  ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function initLogo() {
    const wrap = document.getElementById('logo-grid');
    const lit  = [0, 2, 4, 6, 8]; // 亮起的位置
    for (let i = 0; i < 9; i++) {
      const c = document.createElement('div');
      c.className = 'logo-cell' + (lit.includes(i) ? ' lit' : '');
      wrap.appendChild(c);
    }
    // 随机闪烁
    const cells = wrap.querySelectorAll('.logo-cell');
    setInterval(() => {
      const idx = Math.floor(Math.random() * cells.length);
      cells[idx].classList.toggle('lit');
      setTimeout(() => cells[idx].classList.toggle('lit'), 450);
    }, 700);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
     屏幕切换
  ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  let _mbPaused = false;
  window.togglePause = function() {
    if (gs.phase !== 'clicking' && gs.phase !== 'showing') return;
    _mbPaused = !_mbPaused;
    document.getElementById('pauseOverlay').style.display = _mbPaused ? 'flex' : 'none';
    if (_mbPaused) {
      stopTimer();
    } else if (gs.phase === 'clicking') {
      gs.timer = setInterval(() => {
        gs.timeLeft -= 0.1;
        const pct = Math.max(0, gs.timeLeft / gs.maxTime);
        const danger = pct < 0.3;
        setTimerBar(pct, danger);
        const secEl = document.getElementById('timer-sec');
        secEl.textContent = Math.ceil(gs.timeLeft);
        secEl.className = 'timer-sec' + (danger ? ' danger' : '');
        const hintEl = document.getElementById('hint-text');
        if (danger) hintEl.classList.add('urgent');
        else hintEl.classList.remove('urgent');
        if (gs.timeLeft <= 0) endRound('timeout');
      }, 100);
    }
  };

  window.goBackCover = function() {
    _mbPaused = false;
    stopTimer();
    gs.phase = 'idle';
    document.getElementById('pauseOverlay').style.display = 'none';
    document.getElementById('pauseBtn').style.display = 'none';
    showScreen('start-screen');
  };

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
     游戏流程入口
  ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function startGame() {
    gs.level = 1;
    gs.score = 0;
    _mbPaused = false;
    document.getElementById('pauseOverlay').style.display = 'none';
    document.getElementById('pauseBtn').style.display = 'flex';
    showScreen('game-screen');
    runLevel();
  }

  function restartGame() {
    gs.level = 1;
    gs.score = 0;
    document.getElementById('pauseBtn').style.display = 'flex';
    showScreen('game-screen');
    runLevel();
  }

  function nextLevel() {
    gs.level++;
    document.getElementById('pauseBtn').style.display = 'flex';
    showScreen('game-screen');
    runLevel();
  }

  /* ── 运行当前关卡 ── */
  function runLevel() {
    stopTimer();

    const cfg = levelCfg(gs.level);
    gs.N = cfg.N; gs.X = cfg.X; gs.maxTime = cfg.time;
    gs.blues = []; gs.correct = []; gs.wrong = [];
    gs.phase = 'showing';

    document.getElementById('level-val').textContent = gs.level;
    document.getElementById('score-val').textContent = gs.score;
    setTimerBar(1, false);
    document.getElementById('timer-sec').textContent = '--';
    document.getElementById('timer-sec').className = 'timer-sec';
    setBadge('showing', '记忆中');
    setHint(`观察 ${gs.X} 个蓝色方块的位置…`);

    buildGrid();

    // 随机选出 X 个蓝色格子
    gs.blues = shuffle(Array.from({ length: gs.N * gs.N }, (_, i) => i)).slice(0, gs.X);
    gs.blues.forEach(i => getCell(i).classList.add('blue'));

    // 2 秒后隐藏，播放 GO! 动画，进入作答阶段
    setTimeout(() => {
      if (gs.phase !== 'showing') return;
      gs.blues.forEach(i => getCell(i).classList.remove('blue'));
      playGo(() => startClickPhase());
    }, SHOW_MS);
  }

  /* ── GO! 动画 ── */
  function playGo(cb) {
    const overlay = document.getElementById('go-overlay');
    const text    = document.getElementById('go-text');
    text.style.animation = 'none';
    void text.offsetWidth;
    text.style.animation = 'goAnim 0.85s ease forwards';
    overlay.classList.add('show');
    setTimeout(() => {
      overlay.classList.remove('show');
      cb();
    }, 850);
  }

  /* ── 进入作答阶段 ── */
  function startClickPhase() {
    gs.phase    = 'clicking';
    gs.timeLeft = gs.maxTime;
    setBadge('clicking', '作答中');
    updateHint();

    document.querySelectorAll('.cell').forEach(c => c.classList.add('clickable'));

    gs.timer = setInterval(() => {
      gs.timeLeft -= 0.1;
      const pct    = Math.max(0, gs.timeLeft / gs.maxTime);
      const danger = pct < 0.3;
      setTimerBar(pct, danger);

      const secEl = document.getElementById('timer-sec');
      secEl.textContent = Math.ceil(gs.timeLeft);
      secEl.className   = 'timer-sec' + (danger ? ' danger' : '');

      const hintEl = document.getElementById('hint-text');
      if (danger) hintEl.classList.add('urgent');
      else        hintEl.classList.remove('urgent');

      if (gs.timeLeft <= 0) endRound('timeout');
    }, 100);
  }

  /* ── 玩家点击格子 ── */
  function handleClick(idx) {
    if (gs.phase !== 'clicking' || _mbPaused) return;
    if (gs.correct.includes(idx) || gs.wrong.includes(idx)) return;

    const cell = getCell(idx);
    cell.classList.remove('clickable');

    if (gs.blues.includes(idx)) {
      gs.correct.push(idx);
      cell.classList.add('correct');
      gs.score += 10;
      document.getElementById('score-val').textContent = gs.score;
    } else {
      gs.wrong.push(idx);
      cell.classList.add('wrong');
    }

    updateHint();

    // 成功：X 个全找到
    if (gs.correct.length === gs.X) {
      const bonus = Math.round(gs.timeLeft * 5);
      gs.score += bonus;
      document.getElementById('score-val').textContent = gs.score;
      setTimeout(() => endRound('success'), 550);
      return;
    }

    // 硬性终止：所有格子已点完
    if (gs.correct.length + gs.wrong.length >= gs.N * gs.N) {
      setTimeout(() => endRound('complete'), 550);
    }
  }

  /* ── 结束本轮 ── */
  function endRound(reason) {
    if (gs.phase === 'done') return;
    stopTimer();
    gs.phase = 'done';

    // 展示未被找到的蓝色格子（橙色警示）
    if (reason !== 'success') {
      gs.blues.forEach(i => {
        if (!gs.correct.includes(i)) getCell(i).classList.add('missed');
      });
    }

    setTimeout(() => showResult(reason), 500);
  }

  /* ── 显示结算屏幕 ── */
  function showResult(reason) {
    document.getElementById('pauseBtn').style.display = 'none';
    const success  = reason === 'success';
    const timeout  = reason === 'timeout';
    const complete = reason === 'complete';

    const emojiMap = { success: '🎉', timeout: '⏰', complete: '🔍' };
    document.getElementById('res-emoji').textContent = emojiMap[reason] || '🎉';

    const titleEl = document.getElementById('res-title');
    if (success)  { titleEl.textContent = '通关成功！'; titleEl.className = 'result-title success'; }
    if (timeout)  { titleEl.textContent = '时间到！';   titleEl.className = 'result-title timeout'; }
    if (complete) { titleEl.textContent = '方块已点完'; titleEl.className = 'result-title complete'; }

    document.getElementById('res-correct').textContent = gs.correct.length;
    document.getElementById('res-wrong').textContent   = gs.wrong.length;
    document.getElementById('res-score').textContent   = gs.score;

    // 仅成功才显示「下一关」
    document.getElementById('btn-next').style.display = success ? '' : 'none';

    showScreen('result-screen');
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
     格子构建
  ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${gs.N}, 1fr)`;
    grid.style.gap = '8px';

    const size = calcCellSize(gs.N);

    for (let i = 0; i < gs.N * gs.N; i++) {
      const cell       = document.createElement('div');
      cell.className   = 'cell';
      cell.dataset.idx = i;
      cell.style.width = size + 'px';
      cell.style.height = size + 'px';
      cell.addEventListener('click', () => handleClick(i));
      grid.appendChild(cell);
    }
  }

  /* 根据 N 和屏幕尺寸动态计算格子边长 */
  function calcCellSize(N) {
    const gap  = 8;
    const pad  = 28 + 2;  // grid-wrap 内边距 + 边框
    const maxW = Math.min(window.innerWidth  - 40, 400) - pad - (N - 1) * gap;
    const maxH = (window.innerHeight - 290)            - pad - (N - 1) * gap;
    return Math.max(38, Math.min(80, Math.floor(Math.min(maxW, maxH) / N)));
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
     工具函数
  ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function getCell(idx) {
    return document.querySelector(`[data-idx="${idx}"]`);
  }

  function setBadge(type, text) {
    const el = document.getElementById('phase-badge');
    el.className = 'phase-badge ' + type;
    el.textContent = text;
  }

  function setHint(text) {
    document.getElementById('hint-text').textContent = text;
  }

  function updateHint() {
    const rem = gs.X - gs.correct.length;
    setHint(rem > 0 ? `还有 ${rem} 个方块等待找到` : '太棒了，全部找到！');
  }

  function setTimerBar(pct, danger) {
    const fill = document.getElementById('timer-fill');
    fill.style.width = (pct * 100) + '%';
    fill.className   = 'timer-fill' + (danger ? ' danger' : '');
  }

  function stopTimer() {
    if (gs.timer) { clearInterval(gs.timer); gs.timer = null; }
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /* ── 初始化 ── */
  initLogo();
</script>

<script>
(function(){
  var btn = document.getElementById('homeBtn');
  var ids = ['start-screen','result-screen'];
  function check(){
    var show = ids.some(function(id){
      var e = document.getElementById(id);
      return e && !e.classList.contains('hidden');
    });
    btn.style.display = show ? 'flex' : 'none';
  }
  ids.forEach(function(id){
    var e = document.getElementById(id);
    if(e) new MutationObserver(check).observe(e,{attributes:true,attributeFilter:['class']});
  });
  btn.onmouseover = function(){ this.style.background='rgba(0,0,0,0.8)'; };
  btn.onmouseout  = function(){ this.style.background='rgba(0,0,0,0.55)'; };
  check();
})();
</script>
