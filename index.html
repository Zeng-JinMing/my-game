<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏列表</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    /* ── 顶部标题栏 ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      border-left: 4px solid #4a6cf7;
      padding-left: 10px;
    }

    .header-sub {
      font-size: 13px;
      color: #8a8fa8;
    }

    /* ── 卡片网格 ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── 单张卡片 ── */
    .card {
      border-radius: 16px;
      padding: 16px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 150px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    /* 左列：粉橙色系 */
    .card.pink {
      background: #fff0ef;
    }

    /* 右列：绿色系 */
    .card.green {
      background: #edfaf3;
    }

    /* ── 角标 ── */
    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .badge.today {
      background: #e8eeff;
      color: #4a6cf7;
    }

    .badge.done {
      background: #e2f7ed;
      color: #27ae60;
    }

    /* ── 卡片内容 ── */
    .card-icon {
      font-size: 32px;
      line-height: 1;
    }

    .card-name {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      margin-top: 4px;
    }

    .card-meta {
      font-size: 12px;
      color: #9099b2;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-meta .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #c4c8d8;
      display: inline-block;
    }

    /* ── 按钮 ── */
    .btn {
      margin-top: auto;
      border-radius: 30px;
      padding: 9px 0;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: opacity 0.15s;
      text-decoration: none;
      display: block;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn.primary {
      background: linear-gradient(135deg, #4a6cf7, #6a8dff);
      color: #fff;
      box-shadow: 0 4px 14px rgba(74, 108, 247, 0.35);
    }

    .btn.outline {
      background: #fff;
      color: #4a6cf7;
      border: 1.5px solid #d0d8ff;
    }

    /* ── 响应式：小屏单列 ── */
    @media (max-width: 380px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-title">游戏列表</span>
    <span class="header-sub">通过游戏辅助您的训练</span>
  </div>

  <div class="grid">

    <!-- 1. 寻找猫头鹰 -->
    <div class="card pink" data-game="find-owl">
      <span class="badge today">今日推荐</span>
      <div class="card-icon">🦉</div>
      <div class="card-name">寻找猫头鹰</div>
      <div class="card-meta">
        视觉注意
        <span class="dot"></span>
        10 分钟
      </div>
      <a class="btn primary" href="find-owl-home.html">开始训练</a>
    </div>

    <!-- 2. 记忆方块 -->
    <div class="card green" data-game="memory-block">
      <span class="badge today">今日推荐</span>
      <div class="card-icon">🧩</div>
      <div class="card-name">记忆方块</div>
      <div class="card-meta">
        记忆力
        <span class="dot"></span>
        10 分钟
      </div>
      <a class="btn primary" href="memory-block-home.html">开始训练</a>
    </div>

    <!-- 3. 喂金鱼 -->
    <div class="card pink" data-game="feed-fish">
      <span class="badge today">今日推荐</span>
      <div class="card-icon">🐟</div>
      <div class="card-name">喂金鱼</div>
      <div class="card-meta">
        注意力
        <span class="dot"></span>
        10 分钟
      </div>
      <a class="btn primary" href="feed-fish-home.html">开始训练</a>
    </div>

    <!-- 4. 切水果 -->
    <div class="card green" data-game="fruit-chef">
      <span class="badge today">今日推荐</span>
      <div class="card-icon">🍉</div>
      <div class="card-name">切水果</div>
      <div class="card-meta">
        手手协调
        <span class="dot"></span>
        10 分钟
      </div>
      <a class="btn primary" href="fruit-chef-home.html">开始训练</a>
    </div>

    <!-- 5. 逻辑推理计算 -->
    <div class="card pink" data-game="math-genius">
      <span class="badge today">今日推荐</span>
      <div class="card-icon">🧮</div>
      <div class="card-name">逻辑推理计算</div>
      <div class="card-meta">
        逻辑思维
        <span class="dot"></span>
        10 分钟
      </div>
      <a class="btn primary" href="math-genius-home.html">开始训练</a>
    </div>

    <!-- 6. 高铁枢纽站 -->
    <div class="card green" data-game="rail-hub">
      <span class="badge today">今日推荐</span>
      <div class="card-icon">🚄</div>
      <div class="card-name">高铁枢纽站</div>
      <div class="card-meta">
        执行功能
        <span class="dot"></span>
        10 分钟
      </div>
      <a class="btn primary" href="rail-hub-home.html">开始训练</a>
    </div>

  </div>

  <script>
    const STORAGE_KEY = 'game_played_records';

    // 读取已游玩记录
    function getPlayedGames() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch {
        return {};
      }
    }

    // 标记某个游戏已游玩
    function markAsPlayed(gameId) {
      const records = getPlayedGames();
      records[gameId] = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    // 将卡片切换为"已完成"状态
    function applyPlayedState(card) {
      const badge = card.querySelector('.badge');
      const btn = card.querySelector('.btn');
      badge.textContent = '已完成';
      badge.className = 'badge done';
      btn.textContent = '再玩一次';
      btn.className = 'btn outline';
    }

    // 页面加载时，根据缓存恢复状态
    function initCards() {
      const played = getPlayedGames();
      document.querySelectorAll('.card[data-game]').forEach(card => {
        const gameId = card.dataset.game;
        if (played[gameId]) {
          applyPlayedState(card);
        }
      });
    }

    // 点击按钮时先写入缓存再跳转
    document.querySelectorAll('.card[data-game]').forEach(card => {
      const btn = card.querySelector('.btn');
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        const gameId = card.dataset.game;
        markAsPlayed(gameId);
        window.location.href = btn.getAttribute('href');
      });
    });

    initCards();
  </script>

</body>
</html>
