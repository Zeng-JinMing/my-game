<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>水果厨师</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      display: block;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: none;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      z-index: 10;
      pointer-events: none;
    }
    .hc {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 6px 14px;
      color: #fff;
      font-weight: 700;
      font-size: 20px;
    }

    /* ── Screen Overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 36px 28px;
      background: rgba(6, 3, 20, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      max-width: 340px;
      width: 88%;
      text-align: center;
    }
    .screen.on {
      display: flex;
      animation: popIn .32s cubic-bezier(.34, 1.56, .64, 1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.82); }
      to   { opacity: 1; transform: scale(1);   }
    }

    .si  { font-size: 52px; line-height: 1; }
    .st  { font-size: 36px; font-weight: 900; color: #fff;
           text-shadow: 0 0 24px rgba(255,180,0,.65); line-height: 1.1; }
    .sd  { font-size: 14px; color: rgba(255,255,255,.55); line-height: 1.6; }

    .rules {
      background: rgba(255,255,255,.04);
      border-radius: 14px;
      padding: 12px 16px;
      width: 100%;
      display: flex; flex-direction: column; gap: 8px;
    }
    .rule {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: rgba(255,255,255,.62);
    }
    .ri { font-size: 16px; flex-shrink: 0; }

    .big { font-size: 70px; font-weight: 900; color: #FFD700;
           text-shadow: 0 0 30px rgba(255,215,0,.5); line-height: 1; }
    .lbl { font-size: 13px; color: rgba(255,255,255,.4); margin-top: -8px; }
    .res { font-size: 14px; color: rgba(255,200,100,.85); }

    .btn {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      border: none; border-radius: 100px;
      padding: 14px 50px;
      font-size: 20px; font-weight: 700;
      color: #fff; letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,100,0,.35);
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
    }
    .btn:active { transform: scale(.93); }

    #pauseBtn{position:fixed;bottom:12px;left:12px;z-index:60;display:none;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;}
    #pauseOverlay{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;}
    #pauseOverlay .po-icon{font-size:48px;}
    #pauseOverlay .po-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
    #pauseOverlay .po-btn{width:180px;padding:13px 0;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block;transition:opacity .15s;border:none;}
    #pauseOverlay .po-btn:hover{opacity:.85;}
    #pauseOverlay .po-resume{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;box-shadow:0 4px 16px rgba(255,100,0,.4);}
    #pauseOverlay .po-home{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.25);}

    /* ── Countdown ── */
    #cd {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      z-index: 20; pointer-events: none;
    }
    #cdn {
      font-size: 150px; font-weight: 900;
      color: rgba(255,255,255,.95);
      text-shadow: 0 0 60px rgba(255,200,0,.8);
    }
    .npop { animation: npop .5s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes npop {
      from { transform: scale(1.9); opacity: 0; }
      60%  { transform: scale(.88); opacity: 1; }
      to   { transform: scale(1);  opacity: 1; }
    }
  </style>
</head>
<body>

<canvas id="gc"></canvas>

<button id="pauseBtn" onclick="togglePause()">⏸</button>
<div id="pauseOverlay">
  <div class="po-icon">⏸</div>
  <div class="po-title">游戏已暂停</div>
  <button class="po-btn po-resume" onclick="togglePause()">继续游戏</button>
  <button class="po-btn po-home" onclick="goBackCover()">回到主页</button>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hc" id="hs">⭐ 0</div>
  <div class="hc" id="ht">60</div>
  <div class="hc" id="hl">❤️❤️❤️</div>
</div>

<!-- Countdown -->
<div id="cd"><div id="cdn">3</div></div>

<!-- Screens -->
<div id="overlay">
  <!-- Start -->
  <div id="s0" class="screen on">
    <div class="si">🍉</div>
    <div class="st">水果厨师</div>
    <div class="sd">滑动屏幕切割飞过的水果，赚取积分！<br>小心别碰到炸弹！</div>
    <div class="rules">
      <div class="rule"><span class="ri">🍎</span>切中水果 +10 分</div>
      <div class="rule"><span class="ri">💣</span>切中炸弹 -1 条命</div>
      <div class="rule"><span class="ri">💀</span>失去 3 条命 立即结束</div>
      <div class="rule"><span class="ri">⏱</span>坚持 60 秒 回合结束</div>
    </div>
    <button class="btn" id="b0">开始游戏</button>
  </div>

  <!-- Game Over -->
  <div id="s1" class="screen">
    <div class="si">💥</div>
    <div class="st">游戏结束</div>
    <div class="res" id="rm"></div>
    <div class="big" id="rs">0</div>
    <div class="lbl">最终得分</div>
    <button class="btn" id="b1">再玩一次</button>
  </div>

  <!-- Time Up -->
  <div id="s2" class="screen">
    <div class="si">🏆</div>
    <div class="st">时间到！</div>
    <div class="res">你是出色的水果厨师！</div>
    <div class="big" id="ws">0</div>
    <div class="lbl">最终得分</div>
    <button class="btn" id="b2">再玩一次</button>
  </div>
</div>

<script>
'use strict';

/* ───────────────────────────── Config ── */
const CFG = {
  time:     60,
  maxBombs:  3,
  bombRate: .10,   // ~1 in 10 chance
  spawnMs:  1400,  // initial wave interval (ms)
  minMs:     650,  // minimum wave interval
  accel:      12,  // ms reduction per wave
  r:          38,  // fruit radius (px)
  grav:      .28,  // gravity per frame²
  pts:        10,  // score per fruit
};

const FRUITS = [
  { e:'🍎', j:'#ff4444' }, { e:'🍊', j:'#ff8800' },
  { e:'🍉', j:'#22bb44' }, { e:'🍓', j:'#ff2266' },
  { e:'🍇', j:'#9933cc' }, { e:'🍌', j:'#ffcc00' },
  { e:'🍑', j:'#ff9966' }, { e:'🍋', j:'#ffee00' },
  { e:'🍍', j:'#cc9900' }, { e:'🍒', j:'#cc2244' },
];

/* ───────────────────────────── Canvas ── */
const cv  = document.getElementById('gc');
const ctx = cv.getContext('2d');
let W, H, bgGrad;

function resize() {
  cv.width = W = innerWidth;
  cv.height = H = innerHeight;
  bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#07021a');
  bgGrad.addColorStop(1, '#170836');
}
addEventListener('resize', resize);
resize();

/* ───────────────────────── Background stars ── */
const STARS = Array.from({ length: 85 }, () => ({
  x:  Math.random(),
  y:  Math.random(),
  r:  Math.random() * 1.5 + .4,
  a:  Math.random() * .5 + .15,
  ph: Math.random() * Math.PI * 2,
  fr: Math.random() * .04 + .01,
}));

/* ───────────────────────────── State ── */
let phase = 'menu';           // 'menu' | 'playing' | 'over'
let _fcPaused = false;

function togglePause() {
  if (phase !== 'playing') return;
  _fcPaused = !_fcPaused;
  document.getElementById('pauseOverlay').style.display = _fcPaused ? 'flex' : 'none';
  if (!_fcPaused) { prevT = performance.now(); }
}

function goBackCover() {
  _fcPaused = false;
  phase = 'menu';
  clearInterval(tmrId);
  document.getElementById('pauseOverlay').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'none';
  hudEl.style.display = 'none';
  showScr('s0');
}
let score, bombs, tLeft;
let objs  = [];               // fruits & bombs in flight
let pars  = [];               // juice / explosion particles
let ftxts = [];               // floating score labels
let blade = [];               // blade trail points
let spawnT, spawnI, spawnGen = 0;
let shake = 0, flashAlpha = 0;
let rafId, tmrId;
let prevT = 0, pDown = false, prevP = null;

/* ───────────────────────────── DOM refs ── */
const hudEl  = document.getElementById('hud');
const hScore = document.getElementById('hs');
const hTimer = document.getElementById('ht');
const hLives = document.getElementById('hl');
const cdEl   = document.getElementById('cd');
const cdnEl  = document.getElementById('cdn');
const screens = [...document.querySelectorAll('.screen')];

function showScr(id) {
  screens.forEach(s => s.classList.remove('on'));
  if (id) document.getElementById(id).classList.add('on');
}

/* ───────────────────────────── Input ── */
function gp(e) {
  return e.touches
    ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
    : { x: e.clientX, y: e.clientY };
}

function pStart(e) {
  if (phase !== 'playing' || _fcPaused) return;
  e.preventDefault();
  pDown = true;
  prevP = gp(e);
  blade = [{ ...prevP, a: 1 }];
}

function pMove(e) {
  if (!pDown || phase !== 'playing' || _fcPaused) return;
  e.preventDefault();
  const p = gp(e);
  if (prevP) doSlice(prevP, p);
  blade.push({ x: p.x, y: p.y, a: 1 });
  prevP = p;
}

function pEnd() { pDown = false; prevP = null; }

cv.addEventListener('touchstart', pStart, { passive: false });
cv.addEventListener('touchmove',  pMove,  { passive: false });
cv.addEventListener('touchend',   pEnd,   { passive: false });
cv.addEventListener('mousedown',  pStart);
cv.addEventListener('mousemove',  pMove);
cv.addEventListener('mouseup',    pEnd);

/* ──────────────────── Segment-circle intersection ── */
function segHit(x1, y1, x2, y2, cx, cy, r) {
  const dx = x2-x1, dy = y2-y1, fx = x1-cx, fy = y1-cy;
  const a = dx*dx + dy*dy;
  if (!a) return Math.hypot(fx, fy) < r;
  const b = 2*(fx*dx + fy*dy), c = fx*fx + fy*fy - r*r;
  let d = b*b - 4*a*c;
  if (d < 0) return false;
  d = Math.sqrt(d);
  const t1 = (-b-d) / (2*a), t2 = (-b+d) / (2*a);
  return (t1>=0&&t1<=1) || (t2>=0&&t2<=1) || (t1<0&&t2>1);
}

/* ────────────────────────────── Slice ── */
function doSlice(a, b) {
  if (Math.hypot(b.x-a.x, b.y-a.y) < 4) return;
  objs.forEach(o => {
    if (o.dead || o.cut) return;
    if (segHit(a.x, a.y, b.x, b.y, o.x, o.y, o.r)) hitObj(o, a, b);
  });
}

function hitObj(o, p1, p2) {
  o.cut = true;
  if (o.bomb) {
    bombs++;
    shake = 22;
    flashAlpha = .55;
    boomPars(o.x, o.y);
    o.dead = true;
    updLives();
    if (bombs >= CFG.maxBombs) endGame('bomb');
  } else {
    score += CFG.pts;
    updScore();
    juicePars(o.x, o.y, o.juice);
    makeSplit(o, p1, p2);
    ftxts.push({ x: o.x, y: o.y - o.r, txt: `+${CFG.pts}`, a: 1, vy: -2.2 });
  }
}

/* ── Split the fruit into two halves along cut direction ── */
function makeSplit(o, p1, p2) {
  const dx = p2.x-p1.x, dy = p2.y-p1.y;
  const len = Math.hypot(dx, dy) || 1;
  const nx = -dy/len, ny = dx/len;   // perpendicular to cut
  const spd = 2.8;
  o.halves = [
    { x:o.x, y:o.y, vx:o.vx+nx*spd, vy:o.vy+ny*spd-1.5, rot:o.rot, rs:-.07, side:'L', a:1 },
    { x:o.x, y:o.y, vx:o.vx-nx*spd, vy:o.vy-ny*spd-1.5, rot:o.rot, rs: .07, side:'R', a:1 },
  ];
}

/* ────────────────────────── Particles ── */
function juicePars(x, y, col) {
  for (let i = 0; i < 24; i++) {
    const a = Math.random()*Math.PI*2, s = 2+Math.random()*6;
    pars.push({
      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2.5,
      col: i % 4 === 0 ? '#fff' : col,
      sz: 3 + Math.random()*6, a: 1, dc: .024 + Math.random()*.018,
    });
  }
}

function boomPars(x, y) {
  const cols = ['#ff4400','#ffaa00','#ffff00','#fff'];
  for (let i = 0; i < 36; i++) {
    const a = Math.random()*Math.PI*2, s = 4+Math.random()*10;
    pars.push({
      x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 5,
      col: cols[i % 4],
      sz: 5 + Math.random()*9, a: 1, dc: .016 + Math.random()*.014,
    });
  }
}

/* ─────────────────────────────── Spawn ── */
function spawnObj(gen) {
  if (phase !== 'playing' || gen !== spawnGen) return;
  const isBomb = Math.random() < CFG.bombRate;
  const ang = -Math.PI/2 + (Math.random()-.5)*.85;  // mostly upward
  const spd = 13 + Math.random()*6;
  const o = {
    x:    W/2 + (Math.random()-.5) * W*.28,
    y:    H + 60,
    vx:   Math.cos(ang) * spd * .30,
    vy:   Math.sin(ang) * spd,
    r:    CFG.r,
    rot:  Math.random() * Math.PI * 2,
    rs:   (Math.random()-.5) * .07,
    bomb: isBomb, cut: false, dead: false, halves: null,
  };
  if (!isBomb) {
    const t = FRUITS[Math.floor(Math.random() * FRUITS.length)];
    o.emoji = t.e; o.juice = t.j;
  }
  objs.push(o);
}

/* ────────────────────────────── Update ── */
function update(dt) {
  // Always update stars & decay shake/flash
  STARS.forEach(s => s.ph += s.fr);
  shake     *= .80;
  flashAlpha = Math.max(0, flashAlpha - .05);

  if (phase !== 'playing') return;

  // Wave spawning
  spawnT += dt;
  if (spawnT >= spawnI) {
    spawnT = 0;
    const n = 1 + Math.round(Math.random());   // 1 or 2 fruits per wave
    const g = spawnGen;
    for (let i = 0; i < n; i++) setTimeout(() => spawnObj(g), i * 220);
    spawnI = Math.max(CFG.minMs, spawnI - CFG.accel);
  }

  // Blade trail decay
  blade.forEach(p => p.a -= .07);
  blade = blade.filter(p => p.a > 0);

  // Objects physics
  for (let i = objs.length - 1; i >= 0; i--) {
    const o = objs[i];
    if (o.dead) { objs.splice(i, 1); continue; }

    if (!o.cut) {
      o.x += o.vx; o.y += o.vy;
      o.vy += CFG.grav; o.rot += o.rs;
      if (o.y > H + 120) objs.splice(i, 1);
    } else if (o.halves) {
      let alive = false;
      for (const h of o.halves) {
        h.x += h.vx; h.y += h.vy;
        h.vy += CFG.grav; h.rot += h.rs;
        h.a -= .022; if (h.a > 0) alive = true;
      }
      if (!alive) objs.splice(i, 1);
    } else {
      objs.splice(i, 1);
    }
  }

  // Particles physics
  for (let i = pars.length - 1; i >= 0; i--) {
    const p = pars[i];
    p.x += p.vx; p.y += p.vy; p.vy += CFG.grav * .38;
    p.a -= p.dc; p.sz *= .965;
    if (p.a <= 0 || p.sz < .5) pars.splice(i, 1);
  }

  // Float text
  for (let i = ftxts.length - 1; i >= 0; i--) {
    const t = ftxts[i];
    t.y += t.vy; t.a -= .022;
    if (t.a <= 0) ftxts.splice(i, 1);
  }
}

/* ────────────────────────────── Render ── */
function render() {
  ctx.save();

  // Screen shake
  if (shake > .5)
    ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake);

  // Background
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  STARS.forEach(s => {
    ctx.save();
    ctx.globalAlpha = s.a * (.5 + .5*Math.sin(s.ph));
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Particles (behind fruits)
  pars.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.a);
    ctx.fillStyle = p.col;
    ctx.shadowColor = p.col; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Fruits & halves
  objs.forEach(o => {
    if (o.dead) return;

    // Cut halves – clip each half to its own side
    if (o.cut && o.halves) {
      o.halves.forEach(h => {
        if (h.a <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, h.a);
        ctx.translate(h.x, h.y);
        ctx.rotate(h.rot);
        ctx.beginPath();
        const r = o.r;
        if (h.side === 'L') ctx.rect(-r*2, -r*2, r*2, r*4);
        else                 ctx.rect(0,    -r*2, r*2, r*4);
        ctx.clip();
        ctx.font = `${r*1.7}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(o.emoji, 0, 0);
        ctx.restore();
      });
      return;
    }

    if (o.cut) return;

    // Whole fruit / bomb
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.rotate(o.rot);
    ctx.shadowColor = o.bomb ? 'rgba(255,60,0,.65)' : 'rgba(255,220,0,.25)';
    ctx.shadowBlur  = 14;
    ctx.font = `${o.r * 1.7}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(o.bomb ? '💣' : o.emoji, 0, 0);
    ctx.restore();
  });

  // Blade trail
  if (blade.length >= 2) {
    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (let i = 1; i < blade.length; i++) {
      const t = i / blade.length;
      const p = blade[i], q = blade[i-1];
      ctx.globalAlpha  = p.a * t * .9;
      ctx.strokeStyle  = 'rgba(255,255,200,.95)';
      ctx.lineWidth    = t * 7;
      ctx.shadowColor  = 'rgba(255,255,80,.8)';
      ctx.shadowBlur   = 12;
      ctx.beginPath(); ctx.moveTo(q.x, q.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    }
    ctx.restore();
  }

  // Floating score labels
  ftxts.forEach(t => {
    ctx.save();
    ctx.globalAlpha  = Math.max(0, t.a);
    ctx.font         = 'bold 26px -apple-system, Arial';
    ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#FFD700';
    ctx.shadowColor  = 'rgba(255,200,0,.7)'; ctx.shadowBlur = 10;
    ctx.fillText(t.txt, t.x, t.y);
    ctx.restore();
  });

  // Bomb hit flash
  if (flashAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle   = '#ff2200';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  ctx.restore();
}

/* ───────────────────────────── Loop ── */
function loop(ts) {
  rafId = requestAnimationFrame(loop);
  if (_fcPaused) { prevT = ts; return; }
  const dt = Math.min(ts - prevT, 50);
  prevT = ts;
  update(dt);
  render();
}

/* ──────────────────────────── UI utils ── */
function updScore() { hScore.textContent = '⭐ ' + score; }

function updLives() {
  const rem = CFG.maxBombs - bombs;
  let s = '';
  for (let i = 0; i < CFG.maxBombs; i++) s += i < rem ? '❤️' : '🖤';
  hLives.textContent = s;
}

/* ─────────────────────────── Countdown ── */
function popNum(txt, cb) {
  cdnEl.classList.remove('npop');
  void cdnEl.offsetHeight;                         // force reflow to restart animation
  cdnEl.textContent   = txt;
  cdnEl.style.color   = txt === '开始!' ? '#ffd700' : 'rgba(255,255,255,.95)';
  cdnEl.style.fontSize= txt === '开始!' ? '90px' : '150px';
  cdnEl.classList.add('npop');
  setTimeout(cb, 750);
}

/* ─────────────────────── Game control ── */
function startGame() {
  showScr(null);
  hudEl.style.display = 'none';
  cdEl.style.display  = 'flex';
  popNum('3', () =>
    popNum('2', () =>
      popNum('1', () =>
        popNum('开始!', () => {
          cdEl.style.display = 'none';
          beginRound();
        })
      )
    )
  );
}

function beginRound() {
  phase   = 'playing';
  _fcPaused = false;
  document.getElementById('pauseOverlay').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'flex';
  score   = 0; bombs = 0; tLeft = CFG.time;
  objs    = []; pars = []; ftxts = []; blade = [];
  spawnT  = 0; spawnI = CFG.spawnMs; spawnGen++;
  shake   = 0; flashAlpha = 0;
  pDown   = false; prevP = null;

  updScore(); updLives();
  hTimer.textContent    = tLeft;
  hudEl.style.display   = 'flex';

  clearInterval(tmrId);
  tmrId = setInterval(() => {
    if (phase !== 'playing') { clearInterval(tmrId); return; }
    if (_fcPaused) return;
    tLeft--;
    hTimer.textContent = tLeft;
    if (tLeft <= 0) endGame('time');
  }, 1000);
}

function endGame(why) {
  if (phase === 'over') return;
  phase = 'over';
  document.getElementById('pauseBtn').style.display = 'none';
  clearInterval(tmrId);

  setTimeout(() => {
    hudEl.style.display = 'none';
    if (why === 'bomb') {
      document.getElementById('rm').textContent = `你切到了 ${bombs} 个炸弹！`;
      document.getElementById('rs').textContent = score;
      showScr('s1');
    } else {
      document.getElementById('ws').textContent = score;
      showScr('s2');
    }
  }, 600);
}

/* ───────────────────────── Buttons ── */
document.getElementById('b0').onclick = startGame;
document.getElementById('b1').onclick = startGame;
document.getElementById('b2').onclick = startGame;

/* ───────────────────────────── Boot ── */
prevT = performance.now();
rafId = requestAnimationFrame(loop);
</script>

<script>
(function(){
  var btn = document.getElementById('homeBtn');
  var ids = ['s0','s1','s2'];
  function check(){
    var show = ids.some(function(id){
      var e = document.getElementById(id);
      return e && e.classList.contains('on');
    });
    btn.style.display = show ? 'flex' : 'none';
  }
  ids.forEach(function(id){
    var e = document.getElementById(id);
    if(e) new MutationObserver(check).observe(e,{attributes:true,attributeFilter:['class']});
  });
  btn.onmouseover = function(){ this.style.background='rgba(0,0,0,0.8)'; };
  btn.onmouseout  = function(){ this.style.background='rgba(0,0,0,0.55)'; };
  check();
})();
</script>
