<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>高铁枢纽站</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background:#020810;
      display:flex; justify-content:center; align-items:center;
      min-height:100vh; overflow:hidden;
      font-family:'PingFang SC','Microsoft YaHei',sans-serif;
      touch-action:none;
    }
    #wrap { position:relative; user-select:none; }
    canvas { display:block; border-radius:16px; box-shadow:0 0 80px rgba(0,100,255,0.18); }

    /* ── 分叉口决策按钮 ── */
    #jp {
      position:absolute; bottom:52px; left:0; right:0;
      display:none; justify-content:center; gap:14px; z-index:20;
    }
    .jb {
      padding:13px 24px; min-width:116px; text-align:center;
      border-radius:50px; border:2.5px solid; font-size:14px; font-weight:700;
      cursor:pointer; background:rgba(3,10,26,0.90);
      backdrop-filter:blur(14px); color:#fff;
      transition:transform 0.12s, box-shadow 0.12s;
      letter-spacing:0.5px;
    }
    .jb:active { transform:scale(0.92); }

    /* ── 全屏遮罩界面 ── */
    .scr {
      position:absolute; inset:0; border-radius:16px;
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; z-index:30; padding:28px;
    }
    #ss { background:radial-gradient(ellipse at 50% 38%, #0b2248 0%, #020810 100%); }
    #es { background:rgba(2,8,18,0.96); display:none; }

    .ttl {
      font-size:30px; font-weight:800; color:#fff; text-align:center;
      text-shadow:0 0 30px rgba(0,170,255,0.9), 0 0 70px rgba(0,110,220,0.5);
      margin-bottom:6px;
    }
    .sub { font-size:13px; color:rgba(130,185,255,0.65); margin-bottom:32px; }
    .st-prev { display:flex; gap:20px; margin-bottom:32px; }
    .sp { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .sp-ic {
      width:46px; height:46px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:800; color:#fff;
    }
    .sp-nm { font-size:12px; font-weight:600; }
    .btn {
      padding:14px 52px; border:none; border-radius:50px;
      background:linear-gradient(135deg, #0050ee, #00aaff);
      color:#fff; font-size:17px; font-weight:700; cursor:pointer;
      box-shadow:0 4px 32px rgba(0,150,255,0.45); transition:transform 0.12s;
    }
    .btn:active { transform:scale(0.95); }
    .tip { margin-top:18px; font-size:12px; color:rgba(140,185,255,0.42); text-align:center; line-height:1.9; }
    .sc-big {
      font-size:76px; font-weight:800; color:#FFD93D; line-height:1;
      text-shadow:0 0 40px rgba(255,200,0,0.6); margin:10px 0;
    }
    .rtg { font-size:17px; margin-bottom:14px; }
    .sts { font-size:13px; color:rgba(170,205,255,0.55); line-height:2.1; text-align:center; margin-bottom:26px; }

    #pauseBtn{position:absolute;bottom:12px;left:12px;z-index:60;display:none;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;}
    #pauseOverlay{position:absolute;inset:0;border-radius:16px;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:'PingFang SC','Microsoft YaHei',sans-serif;}
    #pauseOverlay .po-icon{font-size:48px;}
    #pauseOverlay .po-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
    #pauseOverlay .po-btn{width:180px;padding:13px 0;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block;transition:opacity .15s;border:none;}
    #pauseOverlay .po-btn:hover{opacity:.85;}
    #pauseOverlay .po-resume{background:linear-gradient(135deg,#0050ee,#00aaff);color:#fff;box-shadow:0 4px 16px rgba(0,150,255,.4);}
    #pauseOverlay .po-home{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.25);}
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <button id="pauseBtn" onclick="togglePause()">⏸</button>
  <div id="pauseOverlay">
    <div class="po-icon">⏸</div>
    <div class="po-title">游戏已暂停</div>
    <button class="po-btn po-resume" onclick="togglePause()">继续游戏</button>
    <button class="po-btn po-home" onclick="goBackCover()">回到主页</button>
  </div>

  <!-- 分叉口决策按钮 -->
  <div id="jp">
    <button class="jb" id="jb0" onclick="choose(0)">◀ 左</button>
    <button class="jb" id="jb1" onclick="choose(1)">右 ▶</button>
  </div>

  <!-- 开始界面 -->
  <div class="scr" id="ss">
    <div class="ttl">🚄 高铁枢纽站</div>
    <div class="sub">在分叉口做出正确决策，引导高铁驶入对应站台</div>
    <div class="st-prev">
      <div class="sp">
        <div class="sp-ic" style="background:#FF6B6B;box-shadow:0 0 20px #FF6B6B">A</div>
        <div class="sp-nm" style="color:#FF6B6B">北京站</div>
      </div>
      <div class="sp">
        <div class="sp-ic" style="background:#FFD93D;box-shadow:0 0 20px #FFD93D">B</div>
        <div class="sp-nm" style="color:#FFD93D">上海站</div>
      </div>
      <div class="sp">
        <div class="sp-ic" style="background:#6BCB77;box-shadow:0 0 20px #6BCB77">C</div>
        <div class="sp-nm" style="color:#6BCB77">广州站</div>
      </div>
      <div class="sp">
        <div class="sp-ic" style="background:#4DC9F6;box-shadow:0 0 20px #4DC9F6">D</div>
        <div class="sp-nm" style="color:#4DC9F6">成都站</div>
      </div>
    </div>
    <button class="btn" onclick="startGame()">开始游戏</button>
    <div class="tip">
      高铁到达分叉口时，点击左/右按钮进行调度<br>
      正确到站 +100分（连击加成）｜错误入站 -30分
    </div>
  </div>

  <!-- 结束界面 -->
  <div class="scr" id="es">
    <div class="ttl">本局结束</div>
    <div class="sc-big" id="es-sc">0</div>
    <div class="rtg" id="es-rt"></div>
    <div class="sts" id="es-st"></div>
    <button class="btn" onclick="startGame()">再来一局</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//   高铁枢纽站 · 游戏引擎
// ═══════════════════════════════════════════════════════════════════
const CV = document.getElementById('c');
const cx = CV.getContext('2d');
const WP = document.getElementById('wrap');
const GW = 400, GH = 700;

function resize() {
  const s = Math.min((innerWidth - 16) / GW, (innerHeight - 16) / GH);
  CV.width = GW; CV.height = GH;
  CV.style.width  = GW * s + 'px';
  CV.style.height = GH * s + 'px';
  WP.style.width  = GW * s + 'px';
  WP.style.height = GH * s + 'px';
}
resize();
addEventListener('resize', resize);

// ─── 站台配置（4座）────────────────────────────────────────────────
const STATS = [
  { id:'A', name:'北京站', color:'#FF6B6B', x:55,  y:148 },
  { id:'B', name:'上海站', color:'#FFD93D', x:150, y:148 },
  { id:'C', name:'广州站', color:'#6BCB77', x:250, y:148 },
  { id:'D', name:'成都站', color:'#4DC9F6', x:345, y:148 }
];

// ─── 轨道路径（3个分叉口，树形结构）──────────────────────────────
// J1(中) → J2(左,A/B) 或 J3(右,C/D)
const SEG = {
  s_j1: [ [200,655],[200,565],[200,480] ],   // 入口 → J1
  j1_j2:[ [200,480],[155,415],[102,305] ],   // J1 → J2（左，对应A/B）
  j1_j3:[ [200,480],[248,415],[298,305] ],   // J1 → J3（右，对应C/D）
  j2_a: [ [102,305],[72,228],[55,148]  ],    // J2 → 北京站A
  j2_b: [ [102,305],[135,228],[150,148] ],   // J2 → 上海站B
  j3_c: [ [298,305],[268,228],[250,148] ],   // J3 → 广州站C
  j3_d: [ [298,305],[325,228],[345,148] ]    // J3 → 成都站D
};

const SEND = {
  s_j1:'J:j1', j1_j2:'J:j2', j1_j3:'J:j3',
  j2_a:'S:A',  j2_b:'S:B',   j3_c:'S:C',   j3_d:'S:D'
};

// 分叉口元数据（3个，位置 + 选项）
const JD = {
  j1:{ x:200, y:480, opts:[
    { lbl:'◀ 北京/上海', seg:'j1_j2', col:'#4499ff' },
    { lbl:'广州/成都 ▶', seg:'j1_j3', col:'#4499ff' }
  ]},
  j2:{ x:102, y:305, opts:[
    { lbl:'◀ 北京(A)', seg:'j2_a', col:'#FF6B6B' },
    { lbl:'上海(B) ▶',  seg:'j2_b', col:'#FFD93D' }
  ]},
  j3:{ x:298, y:305, opts:[
    { lbl:'◀ 广州(C)', seg:'j3_c', col:'#6BCB77' },
    { lbl:'成都(D) ▶',  seg:'j3_d', col:'#4DC9F6' }
  ]}
};

// ─── 辅助：圆角矩形路径 ─────────────────────────────────────────────
function rr(x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x + r, y);
  cx.lineTo(x + w - r, y);    cx.arcTo(x + w, y,     x + w, y + r,     r);
  cx.lineTo(x + w, y + h - r); cx.arcTo(x + w, y + h, x + w - r, y + h, r);
  cx.lineTo(x + r, y + h);     cx.arcTo(x,     y + h, x,         y + h - r, r);
  cx.lineTo(x, y + r);         cx.arcTo(x,     y,     x + r,     y,         r);
  cx.closePath();
}

// ─── 辅助：平滑曲线路径 ─────────────────────────────────────────────
function smoothPath(pts, col, lw) {
  cx.save();
  cx.strokeStyle = col; cx.lineWidth = lw;
  cx.lineCap = 'round'; cx.lineJoin = 'round';
  cx.beginPath();
  cx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i][0] + pts[i + 1][0]) / 2;
    const my = (pts[i][1] + pts[i + 1][1]) / 2;
    cx.quadraticCurveTo(pts[i][0], pts[i][1], mx, my);
  }
  cx.lineTo(pts[pts.length - 1][0], pts[pts.length - 1][1]);
  cx.stroke();
  cx.restore();
}

// ─── 游戏状态 ───────────────────────────────────────────────────────
let gSt = 'idle', sc = 0, tmr = 60, cmb = 0;
let trains = [], parts = [], queue = [], notices = [];
let pJ = null;    // 当前待决策分叉口 {train, jId}
let totT = 0, okT = 0, ngT = 0;
let sFrm = 0, frm = 0;
let tid;

const SPD  = 2.0;   // 高铁移动速度（px/帧）
const SINT = 300;   // 发车间隔（帧，约5秒）

// ─── 高铁类 ──────────────────────────────────────────────────────────
class Train {
  constructor(d) {
    const s = STATS.find(x => x.id === d);
    this.d   = d;
    this.col = s.color;
    this.seg = 's_j1';
    this.wi  = 0;
    this.x   = SEG.s_j1[0][0];
    this.y   = SEG.s_j1[0][1];
    this.ang = -Math.PI / 2;
    this.st  = 'mv';   // mv=移动中, wt=等待决策, dn=已完成
    this.jId = null;
    this.arrOk = null; // true=正确到站, false=误入
    this.flash = 0;
  }

  upd() {
    if (this.st !== 'mv') return;
    const pts = SEG[this.seg];
    const nxt = pts[this.wi + 1];

    if (!nxt) {
      // 到达当前路段终点
      const [type, id] = SEND[this.seg].split(':');
      if (type === 'J') {
        this.st  = 'wt';
        this.jId = id;
        if (!pJ) { pJ = { train: this, jId: id }; showJ(id); }
      } else {
        this.arrive(id);
      }
      return;
    }

    const dx = nxt[0] - this.x, dy = nxt[1] - this.y;
    const d  = Math.hypot(dx, dy);
    if (d < SPD) {
      this.x = nxt[0]; this.y = nxt[1]; this.wi++;
    } else {
      this.ang = Math.atan2(dy, dx);
      this.x += dx / d * SPD;
      this.y += dy / d * SPD;
    }
  }

  pick(segName) {
    this.seg = segName; this.wi = 0; this.st = 'mv'; this.jId = null;
  }

  arrive(sid) {
    totT++;
    const ok = sid === this.d;
    this.arrOk = ok;
    this.flash = 40;
    if (ok) {
      okT++; cmb++;
      const pts = 100 * Math.min(cmb, 5);
      sc += pts;
      boom(this.x, this.y, this.col);   // 小粒子
      addNotice(sid, true, pts);         // 明显通知
    } else {
      ngT++; cmb = 0;
      sc = Math.max(0, sc - 30);
      boom(this.x, this.y, '#ff5050');  // 小粒子
      addNotice(sid, false, 0);          // 明显通知
    }
    setTimeout(() => { this.st = 'dn'; }, 800);
  }

  draw() {
    if (this.st === 'dn') return;

    // 到站闪光效果
    if (this.flash > 0) {
      this.flash--;
      if (this.flash % 6 < 3) return;
    }

    cx.save();
    cx.translate(this.x, this.y);
    cx.rotate(this.ang + Math.PI / 2);
    const W = 20, H = 34;

    cx.shadowBlur = 18; cx.shadowColor = this.col;

    // 车身
    cx.fillStyle = this.col;
    rr(-W / 2, -H / 2, W, H, 5); cx.fill();

    // 车头（三角形）
    cx.beginPath();
    cx.moveTo(-W / 2, -H / 2);
    cx.lineTo( W / 2, -H / 2);
    cx.lineTo(0, -H / 2 - 8);
    cx.closePath(); cx.fill();

    // 车窗
    cx.shadowBlur = 0;
    cx.fillStyle = 'rgba(255,255,255,0.72)';
    for (let i = 0; i < 3; i++) { rr(-W / 2 + 3, -H / 2 + 5 + i * 9, W - 6, 5, 2); cx.fill(); }

    // 目的地徽章
    cx.fillStyle = 'rgba(0,0,0,0.65)';
    rr(-9, H / 2 - 15, 18, 12, 3); cx.fill();
    cx.fillStyle = '#fff'; cx.font = 'bold 10px sans-serif'; cx.textAlign = 'center';
    cx.fillText(this.d, 0, H / 2 - 6);

    cx.restore();
  }
}

// ─── 粒子效果（精简版）──────────────────────────────────────────────
function boom(x, y, col, txt) {
  // 粒子数量减少、速度和半径调小
  for (let i = 0; i < 8; i++) {
    const a = Math.PI * 2 * i / 8, s = 0.8 + Math.random() * 1.4;
    parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, r: 1.5 + Math.random() * 1.8, col, lf: 1 });
  }
}

function updParts() {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.lf -= 0.032; p.y += p.vy;
    if (p.vx !== undefined) { p.x += p.vx; p.vy += 0.05; }
    if (p.lf <= 0) parts.splice(i, 1);
  }
}

function drawParts() {
  for (const p of parts) {
    cx.save(); cx.globalAlpha = Math.max(0, p.lf);
    cx.fillStyle = p.col; cx.shadowColor = p.col; cx.shadowBlur = 4;
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI * 2); cx.fill();
    cx.restore();
  }
}

// ─── 到站通知（明显提示）────────────────────────────────────────────
function addNotice(stId, ok, pts) {
  const st = STATS.find(s => s.id === stId);
  notices.push({
    x: st.x,
    y: st.y - 45,       // 站台上方弹出
    text: ok ? '✓ 到站正确' : '✗ 误入站台',
    sub:  ok ? `+${pts} 分` : '−30 分',
    col:  ok ? '#6BCB77' : '#FF6B6B',
    lf: 1.0
  });
}

function updNotices() {
  for (let i = notices.length - 1; i >= 0; i--) {
    const n = notices[i];
    n.lf -= 0.016;     // 约2.5秒完全消失
    n.y  -= 0.4;       // 缓缓上浮
    if (n.lf <= 0) notices.splice(i, 1);
  }
}

function drawNotices() {
  for (const n of notices) {
    const alpha = n.lf > 0.8 ? (1 - n.lf) / 0.2 : Math.min(1, n.lf / 0.5);
    cx.save();
    cx.globalAlpha = alpha;

    // 简洁半透明背景，无发光
    const BW = 110, BH = 40;
    cx.fillStyle = 'rgba(0,0,0,0.55)';
    rr(n.x - BW / 2, n.y - BH / 2, BW, BH, 8);
    cx.fill();

    // 左侧色条（用颜色作为简单标识）
    cx.fillStyle = n.col;
    rr(n.x - BW / 2, n.y - BH / 2, 5, BH, 8);
    cx.fill();

    // 主文字
    cx.fillStyle = '#fff';
    cx.font = 'bold 14px PingFang SC,Microsoft YaHei,sans-serif';
    cx.textAlign = 'center';
    cx.fillText(n.text, n.x + 3, n.y - 2);

    // 分数副文字
    cx.fillStyle = n.col;
    cx.font = 'bold 12px sans-serif';
    cx.fillText(n.sub, n.x + 3, n.y + 14);

    cx.restore();
  }
}

// ─── 背景绘制 ────────────────────────────────────────────────────────
const STARS = Array.from({ length: 38 }, () => [
  Math.random() * GW, 125 + Math.random() * (GH - 125)
]);

function drawBG() {
  const g = cx.createLinearGradient(0, 0, 0, GH);
  g.addColorStop(0,    '#030a1c');
  g.addColorStop(0.65, '#04101f');
  g.addColorStop(1,    '#07182a');
  cx.fillStyle = g; cx.fillRect(0, 0, GW, GH);

  for (const [sx, sy] of STARS) {
    const tw = 0.3 + 0.7 * Math.abs(Math.sin(frm * 0.013 + sx * 0.09));
    cx.globalAlpha = tw * 0.55; cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(sx, sy, 1, 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;
}

// ─── 轨道绘制 ────────────────────────────────────────────────────────
function drawTracks() {
  for (const pts of Object.values(SEG)) {
    smoothPath(pts, 'rgba(0,50,115,0.55)', 12);   // 底部阴影
    smoothPath(pts, '#1b5492', 7);                  // 主轨道
    smoothPath(pts, 'rgba(80,170,255,0.22)', 3.5); // 高光
  }
  // 入站段枕木装饰
  const ep = SEG.s_j1;
  const [x1, y1] = ep[0], [x2, y2] = ep[ep.length - 1];
  const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy);
  const nx = -dy / len, ny = dx / len;
  cx.strokeStyle = 'rgba(18,58,118,0.88)'; cx.lineWidth = 7; cx.lineCap = 'butt';
  for (let t = 18; t < len - 8; t += 20) {
    const bx = x1 + dx * t / len, by = y1 + dy * t / len;
    cx.beginPath(); cx.moveTo(bx + nx * 7, by + ny * 7); cx.lineTo(bx - nx * 7, by - ny * 7); cx.stroke();
  }
}

// ─── 站台绘制 ────────────────────────────────────────────────────────
function drawStations() {
  for (const { x, y, color, name, id } of STATS) {
    cx.save();
    // 外光晕
    cx.shadowBlur = 24; cx.shadowColor = color;
    cx.fillStyle = '#091c38'; cx.strokeStyle = color; cx.lineWidth = 2;
    rr(x - 34, y - 36, 68, 72, 10); cx.fill(); cx.stroke();

    // 顶部色条
    cx.fillStyle = color; cx.shadowBlur = 12;
    rr(x - 26, y - 28, 52, 16, 4); cx.fill();

    // 站名文字
    cx.shadowBlur = 0; cx.fillStyle = '#d8eeff';
    cx.font = 'bold 11px PingFang SC,Microsoft YaHei,sans-serif';
    cx.textAlign = 'center'; cx.fillText(name, x, y + 7);

    // 站台ID
    cx.fillStyle = color; cx.font = 'bold 16px sans-serif';
    cx.fillText(id, x, y + 28);
    cx.restore();
  }
}

// ─── 分叉口绘制 ──────────────────────────────────────────────────────
function drawJunctions() {
  for (const [jId, jd] of Object.entries(JD)) {
    const act   = pJ && pJ.jId === jId;
    const pulse = act ? 0.55 + 0.45 * Math.sin(frm * 0.20) : 0.35;
    cx.save();
    cx.shadowBlur = act ? 32 : 12;
    cx.shadowColor = act ? '#ffaa00' : '#2255aa';
    cx.fillStyle = act ? `rgba(255,155,0,${pulse * 0.45})` : 'rgba(0,80,200,0.22)';
    cx.strokeStyle = act ? '#ffaa00' : '#2255aa'; cx.lineWidth = 2.5;
    cx.beginPath(); cx.arc(jd.x, jd.y, act ? 14 : 9, 0, Math.PI * 2); cx.fill(); cx.stroke();

    cx.shadowBlur = 0;
    cx.fillStyle = act ? '#ffcc44' : '#4488bb';
    cx.font = '9px sans-serif'; cx.textAlign = 'center';
    cx.fillText('分叉', jd.x, jd.y + 25);

    if (act && pJ.train) {
      cx.fillStyle = pJ.train.col; cx.font = 'bold 11px sans-serif';
      cx.fillText('↑ ' + pJ.train.d + ' 待决策', jd.x, jd.y - 22);
    }
    cx.restore();
  }
}

// ─── HUD 绘制 ────────────────────────────────────────────────────────
function drawHUD() {
  cx.fillStyle = 'rgba(2,8,20,0.84)'; cx.fillRect(0, 0, GW, 100);
  cx.strokeStyle = 'rgba(0,100,200,0.30)'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(0, 100); cx.lineTo(GW, 100); cx.stroke();

  // 得分
  cx.fillStyle = 'rgba(255,210,50,0.55)'; cx.font = '11px sans-serif'; cx.textAlign = 'left';
  cx.fillText('得 分', 16, 20);
  cx.fillStyle = '#FFD93D'; cx.font = 'bold 30px sans-serif';
  cx.fillText(sc, 16, 52);

  // 连击
  if (cmb > 1) {
    cx.globalAlpha = 0.72 + 0.28 * Math.sin(frm * 0.24);
    cx.fillStyle = '#FF9F43'; cx.font = 'bold 14px sans-serif'; cx.textAlign = 'center';
    cx.fillText('COMBO ×' + cmb, GW / 2, 42);
    cx.globalAlpha = 1;
  }

  // 已完成列次
  const done = totT, total = totT + queue.length + trains.length;
  cx.fillStyle = 'rgba(140,180,220,0.55)'; cx.font = '10px sans-serif'; cx.textAlign = 'left';
  cx.fillText(`列次 ${done}/${total}`, 16, 72);

  // 倒计时
  const tc = tmr <= 10 ? '#FF6B6B' : '#6BCB77';
  cx.fillStyle = 'rgba(150,220,150,0.52)'; cx.font = '11px sans-serif'; cx.textAlign = 'right';
  cx.fillText('剩余时间', GW - 16, 20);
  cx.fillStyle = tc; cx.shadowColor = tc; cx.shadowBlur = tmr <= 10 ? 16 : 0;
  cx.font = 'bold 30px sans-serif'; cx.fillText(tmr + 's', GW - 16, 52);
  cx.shadowBlur = 0;

  // 计时条
  cx.fillStyle = 'rgba(255,255,255,0.07)'; rr(16, 60, GW - 32, 7, 3.5); cx.fill();
  cx.fillStyle = tc; cx.shadowColor = tc; cx.shadowBlur = 9;
  if (tmr > 0) { rr(16, 60, (GW - 32) * (tmr / 60), 7, 3.5); cx.fill(); }
  cx.shadowBlur = 0;

  // 正确率
  if (totT > 0) {
    const acc = ~~(okT / totT * 100);
    const ac = acc >= 80 ? '#6BCB77' : acc >= 60 ? '#FFD93D' : '#FF6B6B';
    cx.fillStyle = ac; cx.font = 'bold 10px sans-serif'; cx.textAlign = 'right';
    cx.fillText(`正确率 ${acc}%`, GW - 16, 82);
  }
}

// ─── 底部候车区可视化 ─────────────────────────────────────────────
function drawQueueArea() {
  if (gSt !== 'play') return;

  // 底部背景条
  cx.fillStyle = 'rgba(2,8,22,0.75)';
  cx.fillRect(0, 656, GW, 44);
  cx.strokeStyle = 'rgba(0,100,200,0.22)'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(0, 656); cx.lineTo(GW, 656); cx.stroke();

  // 入轨指示箭头（指向入口轨道）
  cx.fillStyle = 'rgba(100,180,255,0.38)';
  cx.font = '11px sans-serif'; cx.textAlign = 'center';
  cx.fillText('▲', 200, 651);

  const shown = queue.slice(0, 7);

  if (shown.length === 0) {
    const msg = trains.length > 0 ? '最后一批列车已在途中…' : '全部列车已出发 ✓';
    cx.fillStyle = 'rgba(100,200,130,0.7)';
    cx.font = '11px sans-serif'; cx.textAlign = 'center';
    cx.fillText(msg, GW / 2, 682);
    return;
  }

  // "候车区" 标签
  cx.fillStyle = 'rgba(140,180,220,0.45)';
  cx.font = '9px sans-serif'; cx.textAlign = 'left';
  cx.fillText('候车区', 8, 676);

  // 列车小芯片（第一个高亮=下一辆出发）
  const chipW = 30, chipH = 22, gap = 5;
  const totalW = shown.length * chipW + (shown.length - 1) * gap;
  const sx = Math.round((GW - totalW) / 2);

  for (let i = 0; i < shown.length; i++) {
    const st = STATS.find(s => s.id === shown[i]);
    const bx = sx + i * (chipW + gap);
    const by = 664;

    cx.shadowColor = st.color;
    cx.shadowBlur = i === 0 ? 14 : 4;
    cx.fillStyle = i === 0 ? st.color : st.color + '77';
    rr(bx, by, chipW, chipH, 5); cx.fill();
    cx.shadowBlur = 0;

    cx.fillStyle = i === 0 ? '#fff' : 'rgba(255,255,255,0.55)';
    cx.font = `bold ${i === 0 ? 11 : 9}px sans-serif`;
    cx.textAlign = 'center';
    cx.fillText(shown[i], bx + chipW / 2, by + 15);

    // "NEXT" 标记
    if (i === 0) {
      cx.fillStyle = 'rgba(255,235,80,0.92)';
      cx.font = 'bold 7px sans-serif';
      cx.fillText('NEXT', bx + chipW / 2, by - 2);
    }
  }

  // 剩余数量提示
  if (queue.length > 7) {
    cx.fillStyle = 'rgba(180,210,255,0.4)';
    cx.font = '9px sans-serif'; cx.textAlign = 'right';
    cx.fillText('+' + (queue.length - 7) + ' 列', GW - 8, 682);
  }
}

// ─── 分叉口按钮 UI ────────────────────────────────────────────────────
function showJ(jId) {
  const { opts } = JD[jId];
  ['jb0', 'jb1'].forEach((id, i) => {
    const b = document.getElementById(id);
    b.textContent = opts[i].lbl;
    b.style.borderColor = b.style.color = opts[i].col;
    b.style.boxShadow = `0 0 18px ${opts[i].col}55`;
  });
  document.getElementById('jp').style.display = 'flex';
}

function hideJ() { document.getElementById('jp').style.display = 'none'; }

function choose(idx) {
  if (!pJ || _rhPaused) return;
  const { train, jId } = pJ;
  train.pick(JD[jId].opts[idx].seg);
  pJ = null; hideJ();
  // 下一个等待中的列车
  for (const t of trains) {
    if (t.st === 'wt' && t !== train) { pJ = { train: t, jId: t.jId }; showJ(t.jId); break; }
  }
}

// ─── 列车生成 ─────────────────────────────────────────────────────────
function mkQueue() {
  const ids = STATS.map(s => s.id), q = [];
  // 每站各 2 辆（保底），再随机补 4 辆，共 12 辆
  ids.forEach(id => q.push(id, id));
  for (let i = 0; i < 4; i++) q.push(ids[~~(Math.random() * ids.length)]);
  // Fisher-Yates 洗牌
  for (let i = q.length - 1; i > 0; i--) {
    const j = ~~(Math.random() * (i + 1));
    [q[i], q[j]] = [q[j], q[i]];
  }
  return q;
}

function trySpawn() {
  if (!queue.length) return;
  // 严格排队：前车必须已通过J1并完成决策，才允许下一辆入站
  // t.y > 488 → 列车还在入口到J1的路段上（y从655向480移动）
  // t.jId === 'j1' → 列车正停在J1等待决策
  if (trains.some(t => t.y > 488 || t.jId === 'j1')) return;
  trains.push(new Train(queue.shift()));
}

// ─── 主循环 ───────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (_rhPaused) return;
  frm++;
  cx.clearRect(0, 0, GW, GH);
  drawBG(); drawTracks(); drawStations(); drawJunctions();

  if (gSt === 'play') {
    if (++sFrm >= SINT) { sFrm = 0; trySpawn(); }
    for (const t of trains) t.upd();
    trains = trains.filter(t => t.st !== 'dn');
    updParts();
    updNotices();
    if ((queue.length === 0 && trains.length === 0) || tmr <= 0) endGame();
  }

  for (const t of trains) t.draw();
  drawParts();
  drawQueueArea();
  if (gSt === 'play') drawHUD();
  drawNotices();
}

// ─── 暂停控制 ────────────────────────────────────────────────────────
let _rhPaused = false;
function togglePause() {
  if (gSt !== 'play') return;
  _rhPaused = !_rhPaused;
  document.getElementById('pauseOverlay').style.display = _rhPaused ? 'flex' : 'none';
  if (_rhPaused) {
    clearInterval(tid);
  } else {
    tid = setInterval(() => { if (gSt === 'play' && --tmr <= 0) tmr = 0; }, 1000);
  }
}

function goBackCover() {
  _rhPaused = false;
  gSt = 'idle';
  clearInterval(tid);
  hideJ();
  trains = []; parts = []; notices = []; pJ = null;
  document.getElementById('pauseOverlay').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('es').style.display = 'none';
  document.getElementById('ss').style.display = 'flex';
}

// ─── 游戏控制 ────────────────────────────────────────────────────────
function startGame() {
  sc = 0; tmr = 60; cmb = 0;
  totT = 0; okT = 0; ngT = 0;
  trains = []; parts = []; notices = []; pJ = null;
  sFrm = 260; frm = 0;
  _rhPaused = false;
  document.getElementById('pauseOverlay').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'flex';
  queue = mkQueue();
  document.getElementById('ss').style.display = 'none';
  document.getElementById('es').style.display = 'none';
  hideJ();
  gSt = 'play';
  clearInterval(tid);
  tid = setInterval(() => { if (gSt === 'play' && --tmr <= 0) tmr = 0; }, 1000);
}

function endGame() {
  if (gSt !== 'play') return;
  gSt = 'over';
  document.getElementById('pauseBtn').style.display = 'none';
  clearInterval(tid); hideJ();

  const acc = totT > 0 ? okT / totT : 0;
  const rtg = acc >= 0.9 ? '🏆 大师级调度员！满分通过！'
            : acc >= 0.7 ? '⭐ 优秀调度员，干得漂亮！'
            : acc >= 0.5 ? '👍 合格调度员，还有提升空间'
            :              '💪 继续练习，你能做到的！';
  const rtgCol = acc >= 0.9 ? '#FFD93D' : acc >= 0.7 ? '#6BCB77' : acc >= 0.5 ? '#4dabf7' : '#FF6B6B';

  document.getElementById('es-sc').textContent = sc;
  const rtgEl = document.getElementById('es-rt');
  rtgEl.textContent = rtg; rtgEl.style.color = rtgCol;
  document.getElementById('es-st').innerHTML =
    `总列次 ${totT} ｜ 准点到站 ${okT} ｜ 误入 ${ngT}<br>到站正确率：${totT ? ~~(acc * 100) : 0}%`;
  document.getElementById('es').style.display = 'flex';
}

// ─── 启动 ─────────────────────────────────────────────────────────────
loop();
</script>

<a href="index.html" id="homeBtn" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;transition:background 0.15s;">🏠 首页</a>
<script>
(function(){
  var btn = document.getElementById('homeBtn');
  var ids = ['ss','es'];
  function check(){
    var show = ids.some(function(id){
      var e = document.getElementById(id);
      return e && e.style.display !== 'none';
    });
    btn.style.display = show ? 'flex' : 'none';
  }
  ids.forEach(function(id){
    var e = document.getElementById(id);
    if(e) new MutationObserver(check).observe(e,{attributes:true,attributeFilter:['style']});
  });
  btn.onmouseover = function(){ this.style.background='rgba(0,0,0,0.8)'; };
  btn.onmouseout  = function(){ this.style.background='rgba(0,0,0,0.55)'; };
  check();
})();
</script>
