<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>🦉 寻找猫头鹰</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060e1a; font-family: 'PingFang SC','Microsoft YaHei',Arial,sans-serif; }

    /* ── HUD ─────────────────────────────────── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(6,14,26,.95) 70%, transparent);
    }
    .pill {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 20px; padding: 6px 14px;
      font-size: 14px; font-weight: 600;
      color: #d8c890; display: flex; align-items: center; gap: 5px;
    }
    #timer-val { font-size: 18px; font-weight: 700; color: #70e870; transition: color .3s; }
    #timer-val.urgent { color: #ff5050; animation: blink .45s infinite alternate; }
    @keyframes blink { to { transform: scale(1.18); } }

    /* ── Progress bar ───────────────────────── */
    #prog-wrap { position: fixed; bottom: 0; left: 0; right: 0; height: 5px; background: rgba(255,255,255,.08); z-index: 50; }
    #prog { height: 100%; width: 100%; background: #70e870; transition: width 1s linear, background .5s; }
    #prog.urgent { background: #ff5050; }

    /* ── Scene ──────────────────────────────── */
    #scene {
      position: fixed; inset: 0; touch-action: none; overflow: hidden;
      background:
        radial-gradient(ellipse 55% 35% at 78% 12%, rgba(255,215,70,.08) 0%, transparent 55%),
        linear-gradient(180deg, #060e1a 0%, #091a0b 62%, #0b2010 100%);
    }

    /* Stars */
    .star {
      position: absolute; background: #fff; border-radius: 50%;
      animation: tw var(--d,2s) var(--dl,0s) infinite alternate;
    }
    @keyframes tw { from { opacity: .1; } to { opacity: .85; } }

    /* Moon */
    #moon {
      position: absolute; top: 9%; right: 11%;
      font-size: 56px; pointer-events: none;
      filter: drop-shadow(0 0 22px rgba(255,215,80,.55));
    }

    /* Trees */
    #trees { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; pointer-events: none; }
    .tree  { position: absolute; bottom: 0; line-height: 1; }

    /* Ground mist */
    #mist {
      position: absolute; bottom: 0; left: 0; right: 0; height: 22%;
      background: linear-gradient(to top, rgba(10,32,16,.72) 0%, transparent 100%);
      pointer-events: none; z-index: 2;
    }

    /* ── Owls ───────────────────────────────── */
    .owl {
      position: absolute; transform: translate(-50%,-50%);
      font-size: 40px; line-height: 1; z-index: 10; pointer-events: none;
      transition: opacity .22s ease, transform .22s ease, filter .22s ease;
    }
    .owl.hidden { opacity: 0; transform: translate(-50%,-50%) scale(.65); }
    .owl.found  {
      opacity: 1 !important; transform: translate(-50%,-50%) scale(1) !important;
      filter: drop-shadow(0 0 14px #ffd700) !important;
      animation: owlPop .42s ease;
    }
    @keyframes owlPop {
      0%   { transform: translate(-50%,-50%) scale(.3); }
      65%  { transform: translate(-50%,-50%) scale(1.35); }
      100% { transform: translate(-50%,-50%) scale(1); }
    }

    /* Click feedback */
    .fb {
      position: absolute; font-size: 30px; pointer-events: none; z-index: 25;
      transform: translate(-50%,-50%);
      animation: fbFloat .68s ease forwards;
    }
    @keyframes fbFloat {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(.5); }
      45%  { opacity: 1; transform: translate(-50%,-78%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%,-112%) scale(.85); }
    }

    /* Particles */
    .pt {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 22;
      animation: ptFly var(--dur,.48s) ease forwards;
    }
    @keyframes ptFly { to { opacity: 0; transform: var(--to); } }

    /* ── Screens ────────────────────────────── */
    .screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(6,14,26,.9); backdrop-filter: blur(6px);
      color: #d8c890; text-align: center; padding: 28px;
    }
    .s-icon { font-size: 74px; margin-bottom: 14px; animation: iconIn .5s ease; }
    @keyframes iconIn { from { transform: translateY(-36px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .screen h1 { font-size: 27px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .screen .desc { font-size: 15px; line-height: 1.95; color: #8aaa80; max-width: 290px; margin-bottom: 26px; }
    .screen .desc strong { color: #d8c890; }

    /* How-to hint icons */
    .hints { display: flex; gap: 18px; margin-bottom: 22px; }
    .hint-item { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 12px; color: #7a9a70; }
    .hint-item span.ico { font-size: 26px; }

    /* Stat grid */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 275px; margin-bottom: 26px; }
    .stat-card { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; padding: 13px 8px; }
    .stat-card .lbl { font-size: 11px; color: #7a9a70; margin-bottom: 5px; }
    .stat-card .val { font-size: 22px; font-weight: 700; }

    .btn {
      background: linear-gradient(135deg, #3ea83e, #266226); color: #fff; border: none;
      padding: 14px 44px; font-size: 17px; font-weight: 600; border-radius: 50px;
      cursor: pointer; box-shadow: 0 4px 22px rgba(62,168,62,.42);
      transition: transform .12s, box-shadow .12s;
    }
    .btn:active { transform: scale(.94); box-shadow: 0 2px 10px rgba(62,168,62,.28); }

    /* Win shimmer on result screen */
    .shimmer { animation: shimmer 1.5s infinite alternate; }
    @keyframes shimmer { from { text-shadow: 0 0 0 transparent; } to { text-shadow: 0 0 20px #ffd700, 0 0 40px #ffaa00; } }

    #pauseBtn{position:fixed;bottom:12px;left:12px;z-index:60;display:none;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;}
    #pauseOverlay{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:'PingFang SC','Microsoft YaHei',sans-serif;}
    #pauseOverlay .po-icon{font-size:48px;}
    #pauseOverlay .po-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
    #pauseOverlay .po-btn{width:180px;padding:13px 0;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block;transition:opacity .15s;border:none;}
    #pauseOverlay .po-btn:hover{opacity:.85;}
    #pauseOverlay .po-resume{background:linear-gradient(135deg,#3ea83e,#266226);color:#fff;box-shadow:0 4px 16px rgba(62,168,62,.4);}
    #pauseOverlay .po-home{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.25);}
  </style>
</head>
<body>

<button id="pauseBtn" onclick="togglePause()">⏸</button>
<div id="pauseOverlay">
  <div class="po-icon">⏸</div>
  <div class="po-title">游戏已暂停</div>
  <button class="po-btn po-resume" onclick="togglePause()">继续游戏</button>
  <button class="po-btn po-home" onclick="goBackCover()">回到主页</button>
</div>

<!-- ── Start Screen ────────────────────────────── -->
<div class="screen" id="s-start">
  <div class="s-icon">🦉</div>
  <h1>寻找猫头鹰</h1>
  <p class="desc">
    猫头鹰藏在夜晚的森林里！<br>
    它们会<strong>短暂现身</strong>，记住位置后<br>
    在正确的地方<strong>点击</strong>找到它们。<br>
    限时 <strong>60 秒</strong>，快去找吧！
  </p>
  <div class="hints">
    <div class="hint-item"><span class="ico">🦉</span>点击正确</div>
    <div class="hint-item"><span class="ico">❌</span>点击错误</div>
    <div class="hint-item"><span class="ico">⏱</span>限时60s</div>
  </div>
  <button class="btn" id="btn-start">开始游戏</button>
</div>

<!-- ── End Screen ──────────────────────────────── -->
<div class="screen" id="s-end" style="display:none">
  <div class="s-icon" id="end-icon"></div>
  <h1 id="end-title"></h1>
  <div class="grid2">
    <div class="stat-card"><div class="lbl">找到猫头鹰</div><div class="val" id="r-found"></div></div>
    <div class="stat-card"><div class="lbl">点击次数</div><div class="val" id="r-clicks"></div></div>
    <div class="stat-card"><div class="lbl">剩余时间</div><div class="val" id="r-time"></div></div>
    <div class="stat-card"><div class="lbl">命中率</div><div class="val" id="r-acc"></div></div>
  </div>
  <button class="btn" id="btn-restart">再玩一次</button>
</div>

<!-- ── HUD ────────────────────────────────────── -->
<div id="hud">
  <div class="pill">🦉 <span id="h-found">0</span>/<span id="h-total">5</span></div>
  <div class="pill">⏱ <span id="timer-val">60</span>s</div>
  <div class="pill">点击 <span id="h-clicks">0</span></div>
</div>

<!-- ── Progress bar ───────────────────────────── -->
<div id="prog-wrap"><div id="prog"></div></div>

<!-- ── Game Scene ─────────────────────────────── -->
<div id="scene">
  <div id="moon">🌕</div>
  <div id="trees"></div>
  <div id="mist"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const C = {
  owls:        5,
  totalTime:   60,
  visMs:       2000,   // 显示时长
  hidMs:       1000,   // 隐藏时长
  radius:      44,     // 点击判定半径 px
  staggerMax:  2400,   // 猫头鹰出场随机延迟上限
};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let st = {};   // active, owls[], clicks, correct, found, time, interval

// ═══════════════════════════════════════════════════
//  DOM shortcuts
// ═══════════════════════════════════════════════════
const $  = id => document.getElementById(id);
const sc = $('scene');

// ═══════════════════════════════════════════════════
//  AUDIO  (Web Audio API – simple procedural SFX)
// ═══════════════════════════════════════════════════
const actx = new (window.AudioContext || window.webkitAudioContext)();

function tone(freq, type, dur, vol = .25) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, actx.currentTime + dur);
  o.start(); o.stop(actx.currentTime + dur);
}
const sfxOk   = () => { tone(523,'sine',.11); setTimeout(()=>tone(659,'sine',.11),85); setTimeout(()=>tone(784,'sine',.22),170); };
const sfxBad  = () => tone(175,'square',.09,.13);
const sfxWin  = () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.3),i*115));
const sfxLose = () => { tone(300,'sawtooth',.18,.18); setTimeout(()=>tone(200,'sawtooth',.28,.15),200); };

// ═══════════════════════════════════════════════════
//  SCENE BUILDING
// ═══════════════════════════════════════════════════
function buildStars() {
  sc.querySelectorAll('.star').forEach(el => el.remove());
  for (let i = 0; i < 48; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    const sz = .7 + Math.random() * 2.3;
    el.style.cssText =
      `width:${sz}px;height:${sz}px;` +
      `left:${Math.random()*100}%;top:${Math.random()*50}%;` +
      `--d:${1.3+Math.random()*2.2}s;--dl:${Math.random()*2}s;opacity:.4`;
    sc.insertBefore(el, $('moon'));
  }
}

function buildTrees() {
  const wrap = $('trees');
  wrap.innerHTML = '';
  // [left %, font-size px, opacity]
  const defs = [
    [1, 55,.28],[7,68,.34],[14,52,.28],[20,82,.52],[28,62,.44],[34,44,.3],
    [40,92,.62],[48,58,.42],[55,74,.5],[62,50,.36],[68,88,.58],[75,64,.46],
    [82,56,.38],[88,78,.5],[94,48,.3],[98,70,.44],
  ];
  defs.forEach(([pct, sz, op]) => {
    const t = document.createElement('div');
    t.className = 'tree';
    t.style.cssText = `left:${pct}%;font-size:${sz}px;opacity:${op}`;
    t.textContent = '🌲';
    wrap.appendChild(t);
  });
}

// ═══════════════════════════════════════════════════
//  OWL MANAGEMENT
// ═══════════════════════════════════════════════════
function genPositions() {
  const W = sc.clientWidth, H = sc.clientHeight;
  const mg = 58, minD = 92, maxY = H * .70;
  const pts = [];
  let tries = 0;
  while (pts.length < C.owls && tries++ < 3000) {
    const x = mg + Math.random() * (W - 2 * mg);
    const y = mg + Math.random() * (maxY - mg);
    if (pts.every(p => Math.hypot(p.x - x, p.y - y) >= minD)) pts.push({ x, y });
  }
  return pts;
}

function spawnOwl(id, x, y) {
  const el = document.createElement('div');
  el.className = 'owl hidden';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.textContent = '🦉';
  sc.appendChild(el);

  const owl = { id, x, y, el, found: false, tid: null };
  // 随机延迟后开始出没循环
  owl.tid = setTimeout(() => owlCycle(owl), Math.random() * C.staggerMax);
  return owl;
}

function owlCycle(owl) {
  if (!st.active || owl.found) return;
  owl.el.classList.remove('hidden');                 // 显示
  owl.tid = setTimeout(() => {
    if (!st.active || owl.found) return;
    owl.el.classList.add('hidden');                  // 隐藏
    owl.tid = setTimeout(() => owlCycle(owl), C.hidMs);
  }, C.visMs);
}

function stopOwls() {
  (st.owls || []).forEach(o => clearTimeout(o.tid));
}

// ═══════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════
function onInput(cx, cy) {
  if (!st.active || _owlPaused) return;
  const r = sc.getBoundingClientRect();
  const x = cx - r.left, y = cy - r.top;

  st.clicks++;
  $('h-clicks').textContent = st.clicks;

  // 查找被点击的猫头鹰（已找到的不再判断）
  const hit = st.owls.find(o => !o.found && Math.hypot(o.x - x, o.y - y) <= C.radius);

  if (hit) {
    st.correct++;
    hit.found = true;
    clearTimeout(hit.tid);
    hit.el.classList.remove('hidden');
    hit.el.classList.add('found');
    st.found++;
    $('h-found').textContent = st.found;
    showFB(x, y, '🦉');
    spawnParticles(x, y);
    sfxOk();
    if (st.found >= C.owls) setTimeout(() => endGame(true), 380);
  } else {
    showFB(x, y, '❌');
    sfxBad();
  }
}

sc.addEventListener('click', e => onInput(e.clientX, e.clientY));
sc.addEventListener('touchstart', e => {
  e.preventDefault();
  onInput(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: false });

function showFB(x, y, ch) {
  const fb = document.createElement('div');
  fb.className = 'fb'; fb.textContent = ch;
  fb.style.left = x + 'px'; fb.style.top = y + 'px';
  sc.appendChild(fb);
  setTimeout(() => fb.remove(), 680);
}

function spawnParticles(x, y) {
  const cols = ['#ffd700','#ffb800','#ff8800','#ffe566','#ffcc33'];
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div'); p.className = 'pt';
    const a = Math.PI * 2 * i / 14;
    const d = 38 + Math.random() * 48;
    const dur = (.36 + Math.random() * .3) + 's';
    p.style.cssText =
      `width:6px;height:6px;background:${cols[i%5]};` +
      `left:${x}px;top:${y}px;` +
      `--dur:${dur};--to:translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`;
    sc.appendChild(p);
    setTimeout(() => p.remove(), 720);
  }
}

// ═══════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════
let _owlPaused = false;
function togglePause() {
  if (!st.active) return;
  _owlPaused = !_owlPaused;
  document.getElementById('pauseOverlay').style.display = _owlPaused ? 'flex' : 'none';
  if (_owlPaused) clearInterval(st.interval);
  else startTimer();
}

function goBackCover() {
  _owlPaused = false;
  if (st.active) { st.active = false; clearInterval(st.interval); stopOwls(); }
  document.getElementById('pauseOverlay').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'none';
  $('s-end').style.display = 'none';
  sc.querySelectorAll('.owl,.star').forEach(el => el.remove());
  $('s-start').style.display = 'flex';
}

function startTimer() {
  clearInterval(st.interval);
  st.interval = setInterval(() => {
    if (_owlPaused) return;
    st.time--;
    $('timer-val').textContent = st.time;
    $('prog').style.width = (st.time / C.totalTime * 100) + '%';
    if (st.time <= 10) {
      $('timer-val').classList.add('urgent');
      $('prog').classList.add('urgent');
    }
    if (st.time <= 0) endGame(false);
  }, 1000);
}

// ═══════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════
function startGame() {
  sc.querySelectorAll('.owl,.star').forEach(el => el.remove());
  clearInterval(st.interval);
  stopOwls();
  _owlPaused = false;
  document.getElementById('pauseOverlay').style.display = 'none';

  st = { active: false, owls: [], clicks: 0, correct: 0, found: 0, time: C.totalTime, interval: null };

  $('h-found').textContent   = 0;
  $('h-total').textContent   = C.owls;
  $('h-clicks').textContent  = 0;
  $('timer-val').textContent = C.totalTime;
  $('timer-val').classList.remove('urgent');
  $('prog').style.width  = '100%';
  $('prog').classList.remove('urgent');
  $('s-start').style.display = 'none';
  $('s-end').style.display   = 'none';
  document.getElementById('pauseBtn').style.display = 'flex';

  buildStars();
  buildTrees();

  requestAnimationFrame(() => {
    const pos  = genPositions();
    st.owls    = pos.map((p, i) => spawnOwl(i, p.x, p.y));
    st.active  = true;
    startTimer();
  });
}

function endGame(win) {
  if (!st.active) return;
  st.active = false;
  document.getElementById('pauseBtn').style.display = 'none';
  clearInterval(st.interval);
  stopOwls();

  // 揭示未被找到的猫头鹰（半透明）
  st.owls.filter(o => !o.found).forEach(o => {
    o.el.classList.remove('hidden');
    o.el.style.opacity = '.22';
  });

  if (win) sfxWin(); else sfxLose();

  setTimeout(() => {
    const title  = win ? '太棒了！全部找到！' : '时间到了！';
    const icon   = win ? '🎉' : '⏰';
    const acc    = st.clicks ? Math.round(st.correct / st.clicks * 100) + '%' : '–';

    $('end-icon').textContent  = icon;
    $('end-title').textContent = title;
    if (win) $('end-title').classList.add('shimmer');
    else     $('end-title').classList.remove('shimmer');

    $('r-found').textContent  = st.found + ' / ' + C.owls;
    $('r-clicks').textContent = st.clicks;
    $('r-time').textContent   = st.time + 's';
    $('r-acc').textContent    = acc;

    $('s-end').style.display = 'flex';
  }, 950);
}

// ═══════════════════════════════════════════════════
//  BUTTON EVENTS
// ═══════════════════════════════════════════════════
$('btn-start').addEventListener('click', () => {
  actx.resume();
  startGame();
});
$('btn-restart').addEventListener('click', () => {
  actx.resume();
  startGame();
});
</script>

<a href="index.html" id="homeBtn" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;transition:background 0.15s;">🏠 首页</a>
<script>
(function(){
  var btn = document.getElementById('homeBtn');
  var ids = ['s-start','s-end'];
  function check(){
    var show = ids.some(function(id){
      var e = document.getElementById(id);
      return e && e.style.display !== 'none';
    });
    btn.style.display = show ? 'flex' : 'none';
  }
  ids.forEach(function(id){
    var e = document.getElementById(id);
    if(e) new MutationObserver(check).observe(e,{attributes:true,attributeFilter:['style']});
  });
  btn.onmouseover = function(){ this.style.background='rgba(0,0,0,0.8)'; };
  btn.onmouseout  = function(){ this.style.background='rgba(0,0,0,0.55)'; };
  check();
})();
</script>
